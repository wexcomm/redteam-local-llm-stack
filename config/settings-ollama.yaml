server:
  env_name: ${APP_ENV:ollama}
  host: 0.0.0.0
  port: 8283

llm:
  mode: ollama
  max_new_tokens: 512
  context_window: 4096
  temperature: 0.1

embedding:
  mode: ollama
  ingest_mode: simple

ollama:
  llm_model: dolphin-mistral
  embedding_model: nomic-embed-text
  api_base: http://172.21.16.1:11435
  embedding_api_base: http://172.21.16.1:11435
  keep_alive: 5m
  tfs_z: 1.0
  top_k: 40
  top_p: 0.9
  repeat_last_n: 64
  repeat_penalty: 1.2
  request_timeout: 120.0

vectorstore:
  database: qdrant

qdrant:
  path: local_data/private_gpt/qdrant
